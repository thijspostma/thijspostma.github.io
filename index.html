<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Thijs Postma</title>
    <link rel="stylesheet" href="./CSS/base.css">
    <link rel="stylesheet" href="./CSS/nav.css">
    <link rel="stylesheet" href="./CSS/main.css">
    <link rel="stylesheet" href="./CSS/projects.css">
    <link rel="stylesheet" href="./CSS/darkmode.css">
    <link rel="stylesheet" href="./CSS/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#projects">Projects</a></li>
        </ul>
        <label class="switch">
            <input type="checkbox" id="dark-mode-toggle">
            <span class="slider"></span>
        </label>
    </nav>

    <section id="home" class="main">
        <div class="main-text">
            <p class="greeting">Hey, I'm Thijs 👋</p>
            <h1><span class="blue-text">Software</span> Developer</h1>
            <div class="buttons">
                <a href="mailto:mail@thijspostma.dev" class="button-1">Get in touch</a>
                <a href="#projects" class="button-2">My projects</a>
            </div>
        </div>
        <div class="main-foto">
            <img src="./Foto's/foto.jpeg" alt="Thijs Postma">
        </div>
    </section>

    <section id="projects" class="main-projects">
        <h2>My <span class="blue-text">Projects</span></h2>

        <div class="projects-grid">

            <div class="projects-map">
                <h3>Tsjusterbier</h3>
                <span class="status in-progress">In development</span>
                <p>A social media app where friends can post beers</p>
                <a href="#" class="project-link">View project</a>
            </div>

        </div>
    </section>

    <script src="./JS/color-mode.js"></script>
</body>
</html>
