<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thijs Postma | Software Developer</title>
    <link rel="stylesheet" href="./CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#projects">Projecten</a></li>
        </ul>
        <label class="switch">
            <input type="checkbox" id="dark-mode-toggle">
            <span class="slider"></span>
        </label>
    </nav>

    <section id="home" class="main">
        <div class="main-text">
            <p class="greeting">Hey, ik ben Thijs 👋</p>
            <h1><span class="blue-text">Software</span> Developer</h1>
            <div class="buttons">
                <a href="mailto:mail@thijspostma.dev" class="button-1">Neem contact op</a>
                <a href="#projects" class="button-2">Mijn projecten</a>
            </div>
        </div>
        <div class="main-foto">
            <img src="./Foto's/foto.jpeg" alt="Thijs Postma">
        </div>
    </section>

    <section id="projects" class="main-projects">
        <h2>Mijn <span class="blue-text">Projecten</span></h2>

        <div class="projects-grid">

            <div class="projects-map">
                <h3>Tsjusterbier</h3>
                <span class="status in-progress">In ontwikkeling</span>
                <p>Een social media app waar vrienden bier kunnen posten</p>
                <a href="#" class="project-link">Bekijk project</a>
            </div>

        </div>
    </section>

    <script src="./JS/color-mode.js"></script>
</body>
</html>
